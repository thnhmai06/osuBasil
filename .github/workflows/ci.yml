name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/bancho-pp-ffi/target
          key: cargo-${{ hashFiles('native/bancho-pp-ffi/Cargo.lock') }}

      - name: Build native pp-difficulty engine
        run: cargo build --release
        working-directory: native/bancho-pp-ffi

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"

      - name: Build Docker image
        run: docker build -t bancho-net:ci .
