# Basil settings

[Server]
Domain = "basil.local" # Public-facing hostname clients connect to.
Port = 443 # Kestrel HTTPS listen port for both API and osu!client.
CertPath = "your/ctx/path" # Path to the HTTPS certificate file (PFX)
CertPassword = "your-password" # The password of the HTTPS certificate file (PFX)
MenuIconPath = 'Assets\icon.png' # osu! client's in-game menu icon (top-left). 
MenuOnclickUrl = "https://github.com/thnhmai06/osuBasil" # The click-through URL opened when the icon is clicked.

[Mirror]
# Optional .osz download mirror for /d/{set_id}. Leave unset to report downloads as unavailable
# instead of reaching out to the internet (the server runs fully offline by default).
# DownloadEndpoint = "https://example.local/mirror"

[Bot]
Name = "BasilBot" # BasilBot's display name. Changing this after the first boot renames the seeded id=1 user in-place.
CommandPrefix = "!" # Prefix chat commands must start with (!help, !roll, !mp ...).

[Irc]
# Embedded IRC gateway (irc.<domain>)
Name = "Basil" # IRC Server name
Port = 6667 # IRC Server Port

[Api]
# Gates every api.<domain> management REST route (beatmap/user/replay/match/seasonal CRUD) via the
# X-Admin-Key header. Leave unset to keep the management API locked down (401 on every request).
AdminKey = "ThisIsAdminKey"

[Database]
# SQLite database file path. Relative paths are resolved next to the executable. Only override if
# you want the DB file somewhere other than the default (Basil.db next to the executable).
Path = "Basil.db"
